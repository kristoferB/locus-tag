[package]
name = "locus-core"
version = "0.4.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "A high-performance fiducial marker detector for robotics."
readme = "README.md"
repository = "https://github.com/NoeFontana/locus-tag"
homepage = "https://github.com/NoeFontana/locus-tag"
documentation = "https://noefontana.github.io/locus-tag"
keywords = ["apriltag", "aruco", "fiducial", "marker", "robotics"]
categories = ["computer-vision", "science::robotics"]
include = ["src/**/*", "build.rs", "data/dictionaries/**/*", "profiles/**/*.json", "templates/**/*", "README.md"]
build = "build.rs"

[build-dependencies]
askama = "0.16"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dependencies]
nalgebra = { version = "0.34", default-features = false, features = ["std"] }
rayon = "1.12"
bumpalo = { version = "3.20", features = ["collections"] }
multiversion = "0.8"
thiserror = "2.0"
tracing = { version = "0.1", default-features = false, features = ["release_max_level_info", "attributes"] }
tracing-tracy = { version = "0.11", optional = true }
rerun = { version = "0.20", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
crossbeam-queue = "0.3"
rand = { version = "0.10", optional = true }
rand_distr = { version = "0.6", optional = true }

[dev-dependencies]
divan = "0.1"
proptest = "1.11"
rand = "0.10"
rand_distr = "0.6"
rand_chacha = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
image = "0.25"
libm = "0.2"
csv = "1.3"
walkdir = "2.5.0"
insta = { version = "1.47", features = ["yaml", "redactions"] }
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tracing-appender = "0.2"

[[bench]]
name = "threshold_bench"
harness = false
required-features = ["bench-internals"]

